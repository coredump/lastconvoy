name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Build WASM
        run: cargo build --release --target wasm32-unknown-unknown

      - name: Assemble deploy directory
        run: |
          mkdir -p deploy/assets
          cp assets/web/index.html deploy/
          cp assets/web/mq_js_bundle.js deploy/
          cp target/wasm32-unknown-unknown/release/lastconvoy.wasm deploy/
          cp -r assets/fonts deploy/assets/
          cp -r assets/sprites deploy/assets/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
